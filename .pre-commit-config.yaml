default_stages: [pre-commit, manual]

default_install_hook_types: 
  - pre-commit
  - commit-msg

repos:
-   repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.3.0
    hooks:
    -   id: conventional-pre-commit
        stages: [commit-msg]
        args: [build, bump, chore, ci, docs, feat, fix, hotfix, infr, merge,
              perf, refactor, style, revert, test]